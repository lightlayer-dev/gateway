name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Build UI
        run: cd ui && npm ci && npm run build

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Cross-compile binaries
        run: |
          LDFLAGS="-s -w -X github.com/lightlayer-dev/gateway/internal/cli.Version=${{ steps.version.outputs.VERSION }}"
          platforms=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
          )
          for platform in "${platforms[@]}"; do
            IFS='/' read -r GOOS GOARCH <<< "$platform"
            bin="lightlayer-gateway-${GOOS}-${GOARCH}"
            echo "Building ${bin}..."
            CGO_ENABLED=0 GOOS="${GOOS}" GOARCH="${GOARCH}" \
              go build -ldflags="${LDFLAGS}" -o "dist/${bin}" ./cmd/gateway
          done

      - name: Create tarballs
        run: |
          cd dist
          for bin in lightlayer-gateway-*; do
            tarball="${bin}.tar.gz"
            tar czf "${tarball}" "${bin}" -C ../configs gateway.yaml
            echo "Created ${tarball}"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*.tar.gz

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/lightlayer-dev/gateway:${{ steps.version.outputs.VERSION }}
            ghcr.io/lightlayer-dev/gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
